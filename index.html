<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Intro/Header Section */
        .intro {
            background: white;
            padding: 40px;
            border-bottom: 3px solid #333;
        }
        
        .intro h1 {
            font-size: 2em;
            margin-bottom: 15px;
        }
        
        .intro p {
            line-height: 1.6;
            margin-bottom: 20px;
            max-width: 600px;
        }
        
        .intro img {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
            border-radius: 4px;
        }
        
        /* Sidebar Menu */
        .sidebar {
            width: 250px;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
        }
        
        .sidebar h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        
        .video-list {
            list-style: none;
        }
        
        .video-list li {
            margin-bottom: 10px;
        }
        
        .video-list button {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        
        .video-list button:hover {
            background: #e0e0e0;
            border-color: #333;
        }
        
        .video-list button.active {
            background: #333;
            color: white;
            border-color: #333;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .intro-full {
            background: white;
            padding: 40px;
        }
        
        .video-player {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #f5f5f5;
        }
        
        .video-player iframe {
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 4px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
            
            .intro {
                padding: 20px;
            }
            
            .intro h1 {
                font-size: 1.5em;
            }
            
            .video-player {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar with video menu -->
        <div class="sidebar">
            <h2>Videos</h2>
            <ul class="video-list" id="videoMenu">
                <!-- Videos will be generated by JavaScript -->
            </ul>
        </div>
        
        <!-- Main content area -->
        <div class="main">
            <!-- Intro section -->
            <div class="intro-full">
                <h1>My Video Gallery</h1>
                <p>Welcome to my collection of videos. Select any video from the menu to the left to watch it here.</p>
                <img src="https://via.placeholder.com/600x300" alt="Intro image">
            </div>
            
            <!-- Video player -->
            <div class="video-player">
                <iframe id="videoFrame" 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        frameborder="0" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>
    
    <script>
        // LIST OF YOUR VIDEOS
        // Format: { title: "Video Name", videoId: "YOUTUBE_VIDEO_ID" }
        // To get the video ID: go to YouTube, open your video, look at the URL
        // Example: https://www.youtube.com/watch?v=dQw4w9WgXcQ  → ID is "dQw4w9WgXcQ"
        
        const videos = [
            { title: "Video One", videoId: "dQw4w9WgXcQ" },
            { title: "Video Two", videoId: "jNQXAC9IVRw" },
            { title: "Video Three", videoId: "9bZkp7q19f0" },
            { title: "Video Four", videoId: "OPf0YbXqDm0" },
            // Add more videos here following the same format
        ];
        
        // Generate menu buttons
        const videoMenu = document.getElementById('videoMenu');
        videos.forEach((video, index) => {
            const li = document.createElement('li');
            const button = document.createElement('button');
            button.textContent = video.title;
            button.onclick = () => playVideo(video.videoId, button);
            if (index === 0) button.classList.add('active'); // First video is default
            li.appendChild(button);
            videoMenu.appendChild(li);
        });
        
        // Play selected video
        function playVideo(videoId, buttonElement) {
            // Update iframe
            const iframe = document.getElementById('videoFrame');
            iframe.src = `https://www.youtube.com/embed/${videoId}`;
            
            // Update button styles
            document.querySelectorAll('.video-list button').forEach(btn => {
                btn.classList.remove('active');
            });
            buttonElement.classList.add('active');
        }
    </script>
</body>
</html>
